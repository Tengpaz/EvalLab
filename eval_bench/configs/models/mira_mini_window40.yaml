# Model config for EasyLab-JiT MiraMiniTransformer (original variant, windowed DL3DV).
#
# Same architecture as mira_mini but trained with SCENE_WINDOW_SIZE=40 for 100k steps.
#
# Architecture: MiraMini-L/16
#   depth=24, hidden_size=1024, num_heads=16, patch_size=16
#   Trained on DL3DV (windowed, window=40) at 256×256 with 8 views per scene.
#
# Training config: configs/mira_mini_transformer/dl3dv_mira_mini_window40.py
# Checkpoint path: outputs/mira_mini/dl3dv_mira_mini_l16_window40/ckpts/final.pt

type: python
name: mira_mini_window40
adapter: adapters/mira_mini_adapter.py:MiraMiniAdapter

weights: /mnt/pfs/users/huangzehuan/projects/wangyuzhen/EasyLab-JiT/outputs/mira_mini/dl3dv_mira_mini_l16_window40/ckpts/final.pt

device: cuda:0

extra_args:
  easylab_path: /mnt/pfs/users/huangzehuan/projects/wangyuzhen/EasyLab-JiT
  model_type: mira_mini
  img_size: 256
  num_sampling_steps: 50
  dtype: float32
  model_params:
    patch_size: 16
    in_channels: 3
    hidden_size: 1024
    depth: 24
    num_heads: 16
    mlp_ratio: 4.0
    num_views: 8
    bottleneck_dim: 128
    attn_drop: 0.0
    proj_drop: 0.0
  diffusion_params:
    pred_mode: x0_to_v
    t_schedule: logit_normal
    P_mean: 0.8
    P_std: 0.8
    t_eps: 0.05
    noise_scale: 2.0
